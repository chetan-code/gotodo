<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Go Todo App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@knadh/oat/oat.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@knadh/oat/oat.min.js"></script>
    <style>
        /* Minimal layout CSS to perfectly center the card on the screen */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f9fafb; /* Soft background so the white card pops */
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <main class="login-container">
        
        <article class="card">
            
            <header style="text-align: center; margin-bottom: 1.5rem;">
                <h2 style="margin-bottom: 0.5rem;">Sign in</h2>
                <p style="margin: 0; opacity: 0.7;">Access your personal todo list</p>
            </header>

            {{if .}}
                <div role="alert" data-variant="error" style="margin-bottom: 1.5rem;">
                    <strong>Error:</strong> {{.}}
                </div>
            {{end}}

            <a href="/auth/google" class="button" style="display: block; width: 100%; text-align: center;">
                Login with Google
            </a>
            
            <footer style="text-align: center; margin-top: 2rem; opacity: 0.7;">
                <small>We don't store any private profile info!</small>
            </footer>
            
        </article>
        
    </main>
</body>
</html>
